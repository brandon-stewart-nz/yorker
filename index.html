  <!-- Load web fonts WITHOUT blocking first paint. The cross-origin Fonts CSS
       isn't in the service-worker cache, so as a render-blocking <link> it had to

  <!-- Mark the installed standalone PWA before first paint so style.css can give
       the locked app-shell the full-screen height. Without this the shell stops
       at the iOS home-indicator inset and the body background paints a cream band
       there. iOS never matches @media(display-mode:standalone), so
       navigator.standalone is the reliable signal. -->
  <script>if(navigator.standalone===true||matchMedia('(display-mode: standalone)').matches){document.documentElement.classList.add('pwa-standalone');}</script>
  <!-- Critical first-paint colours so a PWA cold launch shows the branded shell
       (teal header on cream) the instant the WebView paints — not a white flash —
       even before style.css applies. style.css then takes over with the full
       gradient/layout. -->
  <style>
    html, body { margin: 0; background: #FBF9F3; }
    .header { background: #1A4D58; }
    /* In-app launch splash — installed PWA only. Picks up seamlessly from the
       native iOS launch image (gold ball on teal), holds ~2s, then a small
       script fades it out to reveal the app. Hidden entirely in a browser.
       Explicit width/height deliberately over-constrain inset:0 (right/bottom
       ignored per CSS2 §10.3.7) because in iOS standalone the fixed-position box
       can stop short of the physical screen the same way dvh does — 100vh is the
       full screen (same fix as the app shell in style.css).
       Geometry (circle 95vw, center 50%/46%, ball 34.5% width, stops 0%/100%)
       must stay in sync with assets/gen-splash.js or the swap glitches. */
    #splash { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 9999; display: none;
      background: radial-gradient(circle 95vw at 50% 46%, #16474F 0%, #0E353D 100%);
      transition: opacity 0.6s ease; }
    html.pwa-standalone #splash { display: block; }
    #splash svg { position: absolute; left: 50%; top: 46%; transform: translate(-50%, -50%);
      width: 34.5%; max-width: 240px; height: auto; }
    #splash.is-hidden { opacity: 0; pointer-events: none; }
  </style>
  <link rel="stylesheet" href="style.css">
