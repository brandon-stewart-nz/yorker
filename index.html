<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#1A4D58">
  <title>Yorker</title>

  <!-- Google Analytics (GA4). Async; the inline stub queues gtag() calls in
       dataLayer, so calls made before the script arrives (or when an
       ad-blocker eats it) are safe no-ops. send_page_view is OFF — the hash
       router in app.js sends a virtual page_view per route instead, so GA
       sees clean per-screen paths (/standings, /player/vernon, /match/12345)
       rather than one undifferentiated index.html entry. -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W41MB519P8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-W41MB519P8', { send_page_view: false });
  </script>

  <!-- Link-preview card. Read by iMessage / WhatsApp / Slack / etc., which
       fetch the base URL only: they ignore the #hash and don't run our JS, so
       this is ONE static card shared by every link. The page-specific title
       (player name, "Team A vs Team B", etc.) travels in the share text that
       app.js sets when the share button is tapped. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Yorker">
  <meta property="og:title" content="Yorker — Indoor Cricket">
  <meta property="og:description" content="Live fixtures, results, the Division 8 ladder and player stats — Hutt Indoor Sports.">
  <meta property="og:image" content="https://yorker.app/og-image.png">
  <meta property="og:image:width" content="600">
  <meta property="og:image:height" content="600">
  <meta property="og:image:alt" content="Yorker — a gold cricket ball on a teal tile">
  <meta property="og:url" content="https://yorker.app/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Yorker — Indoor Cricket">
  <meta name="twitter:description" content="Live fixtures, results, the Division 8 ladder and player stats — Hutt Indoor Sports.">
  <meta name="twitter:image" content="https://yorker.app/og-image.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Yorker">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS PWA launch screens: a centred gold ball on brand teal (matching the
       app icon) so the installed app's launch screen is branded instead of a
       blank white frame. One PNG per iPhone resolution (portrait); generated by
       assets/gen-splash.js. -->
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-750-1334.png">
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1242-2208.png">
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1125-2436.png">
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-828-1792.png">
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1242-2688.png">
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1170-2532.png">
  <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1284-2778.png">
  <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1179-2556.png">
  <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1290-2796.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Load web fonts WITHOUT blocking first paint. The cross-origin Fonts CSS
       isn't in the service-worker cache, so as a render-blocking <link> it had to
       be fetched from the network before the first paint — that's the ~1s white
       screen on a PWA cold launch. media="print" makes it non-blocking; onload
       flips it to all. The page paints instantly in the system-font fallback and
       Oxanium/Inter swap in (font-display:swap). -->
  <link rel="stylesheet" media="print" onload="this.media='all'"
        href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  </noscript>
  <!-- Mark the installed standalone PWA before first paint so style.css can give
       the locked app-shell the full-screen height. Without this the shell stops
       at the iOS home-indicator inset and the body background paints a cream band
       there. iOS never matches @media(display-mode:standalone), so
       navigator.standalone is the reliable signal. -->
  <script>if(navigator.standalone===true||matchMedia('(display-mode: standalone)').matches){document.documentElement.classList.add('pwa-standalone');}</script>
  <!-- Critical first-paint colours so a PWA cold launch shows the branded shell
       (teal header on cream) the instant the WebView paints — not a white flash —
       even before style.css applies. style.css then takes over with the full
       gradient/layout. -->
  <style>
    html, body { margin: 0; background: #FBF9F3; }
    .header { background: #1A4D58; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="#" class="brand" aria-label="Blazing Firebirds home" draggable="false">
        <span class="brand-text" id="brand-text">
          <span class="brand-text__top">Blazing</span>
          <span class="brand-text__bottom">Firebirds</span>
        </span>
      </a>
      <button type="button" class="share-btn" id="share-btn" aria-label="Share this page" title="Share this page">
        <svg class="share-btn__icon" viewBox="0 0 110 110" fill="currentColor" aria-hidden="true">
          <path d="M100.576 0.371223C106.049 -1.45252 111.254 3.75314 109.43 9.22525L77.5008 105.014C75.5784 110.782 67.7227 111.525 64.7522 106.221L44.8275 70.6406L69.3146 46.1536C70.8767 44.5915 70.8767 42.0589 69.3146 40.4968C67.7524 38.935 65.2197 38.9348 63.6577 40.4968L39.1734 64.981L3.58057 45.0495C-1.7238 42.079 -0.979866 34.2233 4.78762 32.3008L100.576 0.371223Z"/>
        </svg>
        <span class="share-btn__label">Share</span>
      </button>
    </div>
  </header>

  <div class="scroll-pane">
    <main id="app" class="app">
      <div class="loading">Loading squad data…</div>
    </main>

    <footer class="footer">
      <div class="footer-updated" id="meta-strip" aria-live="polite"></div>
      <p>Data from <a href="https://hutt.spawtz.com/" target="_blank" rel="noopener">Hutt Indoor Sports</a> · Refreshes every 1 hour</p>
      <p class="footer-fineprint">Built by Brandon, Vernon's Dad (Blazing Firebirds). <span class="footer-long">Any feedback, please <a href="mailto:buzzofnz@gmail.com?subject=Blazing%20Firebirds%20App%20Feedback" target="_blank" rel="noopener">email me</a></span><span class="footer-short">Any feedback, please <a href="mailto:buzzofnz@gmail.com?subject=Blazing%20Firebirds%20App%20Feedback" target="_blank" rel="noopener">email me</a></span></p>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
