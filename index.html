<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#1A4D58">
  <title>Blazing Firebirds</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Firebirds">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Mark the installed standalone PWA before first paint so style.css can give
       the locked app-shell the full-screen height. Without this the shell stops
       at the iOS home-indicator inset and the body background paints a cream band
       there. iOS never matches @media(display-mode:standalone), so
       navigator.standalone is the reliable signal. -->
  <script>if(navigator.standalone===true||matchMedia('(display-mode: standalone)').matches){document.documentElement.classList.add('pwa-standalone');}</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="#" class="brand" aria-label="Blazing Firebirds home">
        <span class="brand-text" id="brand-text">
          <span class="brand-text__top">Blazing</span>
          <span class="brand-text__bottom">Firebirds</span>
        </span>
      </a>
      <div class="header__meta">
        <div class="meta" id="meta-strip" aria-live="polite"></div>
        <button type="button" class="share-btn" id="share-btn" aria-label="Share this page" title="Share this page">
          <svg class="share-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="scroll-pane">
    <main id="app" class="app">
      <div class="loading">Loading squad data…</div>
    </main>

    <footer class="footer">
      <p>Data from <a href="https://hutt.spawtz.com/" target="_blank" rel="noopener">Hutt Indoor Sports</a> · Refreshes every 1 hour</p>
      <p class="footer-fineprint">Built by Vernon's Dad Brandon from Blazing Firebirds. <span class="footer-long">Any feedback please feel free to <a href="mailto:buzzofnz@gmail.com?subject=Blazing%20Firebirds%20App%20Feedback" target="_blank" rel="noopener">email me</a></span><span class="footer-short">Any feedback please <a href="mailto:buzzofnz@gmail.com?subject=Blazing%20Firebirds%20App%20Feedback" target="_blank" rel="noopener">email me</a></span></p>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
